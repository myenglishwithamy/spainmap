<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spain Master: Communities & Capitals</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --sun: #FFD93D; --sun-deep: #F4A261; --fiesta: #E63946; --oliva: #2D6A4F;
  --sky: #1A85C8; --sky-light: #E8F4FD; --cream: #FFFBF0; --ink: #1A1A2E;
  --correct: #2D9E5F; --wrong: #E63946;
  --shadow: 0 4px 20px rgba(0,0,0,0.12); --shadow-lg: 0 8px 40px rgba(0,0,0,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif; background: var(--cream); min-height: 100vh;
  background-image: radial-gradient(circle at 10% 20%, rgba(255,217,61,0.12) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(230,57,70,0.08) 0%, transparent 50%);
}
header {
  background: linear-gradient(135deg, var(--fiesta) 0%, #C1121F 100%);
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 20px rgba(230,57,70,0.4); position: relative; overflow: hidden;
}
header::before { content:'🇪🇸'; position:absolute; font-size:100px; opacity:0.06; right:-10px; top:-10px; }
.header-title { font-family:'Fredoka One',cursive; color:#fff; font-size:1.6rem; letter-spacing:1px; text-shadow:0 2px 8px rgba(0,0,0,0.3); }
.header-title span { color:var(--sun); }
.level-tabs { display:flex; gap:6px; }
.level-tab { background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.35); color:#fff; padding:6px 14px; border-radius:50px; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.82rem; cursor:pointer; transition:all 0.25s; white-space:nowrap; }
.level-tab:hover { background:rgba(255,255,255,0.3); transform:translateY(-1px); }
.level-tab.active { background:var(--sun); color:var(--ink); border-color:var(--sun); box-shadow:0 4px 12px rgba(255,217,61,0.5); }
.score-badge { background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.4); border-radius:50px; padding:5px 16px; color:#fff; font-weight:800; font-size:0.95rem; display:flex; align-items:center; gap:5px; }
.score-badge .star { color:var(--sun); }
.progress-bar-wrap { background:linear-gradient(90deg,var(--sun),var(--sun-deep)); height:7px; position:relative; }
.progress-bar-fill { background:var(--fiesta); height:100%; transition:width 0.6s cubic-bezier(.68,-0.55,.27,1.55); position:relative; min-width:0; }
.progress-bar-fill::after { content:''; position:absolute; right:-5px; top:-3px; width:13px; height:13px; background:var(--fiesta); border-radius:50%; border:2px solid #fff; box-shadow:0 2px 6px rgba(230,57,70,0.5); }
.progress-label { background:var(--sun); text-align:center; padding:3px; font-size:0.72rem; font-weight:800; color:var(--ink); letter-spacing:1px; text-transform:uppercase; }
main { max-width:1140px; margin:0 auto; padding:20px 14px 40px; }
#level2, #level3 { display:none; }
.layout { display:grid; grid-template-columns:1fr 340px; gap:18px; align-items:start; }
.layout-wide { display:grid; grid-template-columns:1fr 380px; gap:18px; align-items:start; }
.map-container { background:#fff; border-radius:20px; box-shadow:var(--shadow-lg); padding:16px; position:relative; }
.map-hint { position:absolute; top:12px; left:50%; transform:translateX(-50%); background:var(--sky); color:#fff; padding:3px 14px; border-radius:50px; font-size:0.73rem; font-weight:800; letter-spacing:0.5px; white-space:nowrap; z-index:10; box-shadow:0 2px 8px rgba(26,133,200,0.4); }
.map-svg { width:100%; height:auto; display:block; }
.region-path { stroke:#fff; stroke-width:1.2; cursor:pointer; transition:filter 0.15s; fill:#A8D5BA; }
.region-path:hover { filter:brightness(1.15) drop-shadow(0 3px 8px rgba(0,0,0,0.25)); }
.region-path.active { fill:var(--fiesta) !important; filter:drop-shadow(0 3px 10px rgba(230,57,70,0.55)); }
.region-path.learned { fill:#2D9E5F; }
.region-path.highlighted { fill:var(--sun); animation:pulseR 1.1s ease-in-out infinite; }
.region-path.dim { fill:#d0e8f7; opacity:0.6; }
@keyframes pulseR { 0%,100%{filter:drop-shadow(0 0 5px rgba(255,217,61,0.5))} 50%{filter:drop-shadow(0 0 16px rgba(255,217,61,0.9))} }
.region-label { font-family:'Nunito',sans-serif; font-weight:800; fill:#1A1A2E; pointer-events:none; font-size:8px; }
.info-card { background:#fff; border-radius:20px; box-shadow:var(--shadow-lg); padding:22px; position:sticky; top:16px; min-height:280px; border-top:5px solid var(--sun); }
.card-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; height:250px; color:#ccc; text-align:center; }
.card-placeholder .emoji { font-size:3.5rem; margin-bottom:10px; opacity:0.5; }
.card-placeholder p { font-size:0.9rem; font-weight:700; color:#ccc; }
.region-card { animation:slideIn 0.3s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.rc-flag { font-size:3rem; text-align:center; margin-bottom:8px; }
.rc-name { font-family:'Fredoka One',cursive; font-size:1.5rem; color:var(--fiesta); text-align:center; margin-bottom:3px; }
.rc-sublabel { text-align:center; font-size:0.72rem; text-transform:uppercase; letter-spacing:2px; color:#aaa; margin-bottom:3px; }
.rc-capital { text-align:center; font-family:'Fredoka One',cursive; font-size:1.2rem; color:var(--sky); margin-bottom:14px; }
.mnemonic { background:linear-gradient(135deg,#FFF9E6,#FFF3CC); border:2px dashed var(--sun-deep); border-radius:10px; padding:12px; font-size:0.84rem; font-weight:700; color:var(--ink); line-height:1.5; margin-bottom:12px; }
.mnemonic::before { content:'💡 '; color:var(--sun-deep); }
.btn-learned { width:100%; padding:11px; background:linear-gradient(135deg,var(--oliva),#40916C); color:#fff; border:none; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px rgba(45,106,79,0.4); }
.btn-learned:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(45,106,79,0.5); }
.checklist { margin-top:16px; background:#fff; border-radius:14px; box-shadow:var(--shadow); padding:14px; }
.checklist h3 { font-family:'Fredoka One',cursive; color:var(--ink); margin-bottom:10px; font-size:0.95rem; }
.cl-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.cl-item { display:flex; align-items:center; gap:5px; font-size:0.75rem; font-weight:700; color:#999; padding:3px 5px; border-radius:6px; }
.cl-item.done { color:var(--oliva); }
.cl-dot { width:14px; height:14px; border-radius:50%; border:2px solid #ddd; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.55rem; }
.cl-item.done .cl-dot { background:var(--oliva); border-color:var(--oliva); color:#fff; }
.quiz-panel { background:#fff; border-radius:20px; box-shadow:var(--shadow-lg); padding:24px; border-top:5px solid var(--sky); position:sticky; top:16px; }
.master-panel { background:#fff; border-radius:20px; box-shadow:var(--shadow-lg); padding:24px; border-top:5px solid var(--fiesta); position:sticky; top:16px; }
.mode-toggle { display:flex; background:#f0f4f8; border-radius:50px; padding:3px; margin-bottom:16px; gap:3px; }
.mode-btn { flex:1; padding:7px; border:none; border-radius:50px; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.78rem; cursor:pointer; background:transparent; color:#888; transition:all 0.2s; }
.mode-btn.active { background:#fff; color:var(--sky); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.q-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:2px; color:var(--sky); font-weight:800; margin-bottom:5px; }
.q-text { font-family:'Fredoka One',cursive; font-size:1.3rem; color:var(--ink); margin-bottom:18px; line-height:1.3; }
.q-text span { color:var(--fiesta); }
.options-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:14px; }
.opt-btn { background:var(--sky-light); border:2px solid #d0e8f7; border-radius:12px; padding:12px 8px; font-family:'Nunito',sans-serif; font-size:0.9rem; font-weight:800; color:var(--ink); cursor:pointer; transition:all 0.2s; text-align:center; line-height:1.3; }
.opt-btn:hover:not(:disabled) { background:#d0e8f7; border-color:var(--sky); transform:translateY(-2px); box-shadow:0 4px 10px rgba(26,133,200,0.18); }
.opt-btn.correct { background:#D4EDDA; border-color:var(--correct); color:var(--correct); animation:correctPop 0.35s ease; }
.opt-btn.wrong { background:#FFDDE1; border-color:var(--wrong); color:var(--wrong); animation:shake 0.35s ease; }
.opt-btn.reveal { background:#D4EDDA; border-color:var(--correct); color:var(--correct); }
.opt-btn:disabled { cursor:not-allowed; }
@keyframes correctPop { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.fb-box { border-radius:12px; padding:12px; font-size:0.84rem; font-weight:700; line-height:1.5; margin-bottom:12px; animation:fadeIn 0.3s ease; display:none; }
.fb-box.show { display:block; }
.fb-correct { background:#D4EDDA; color:#155724; border:2px solid #c3e6cb; }
.fb-wrong { background:#FFF3E0; color:#6D4C41; border:2px solid #FFD180; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.btn-next { width:100%; padding:12px; background:linear-gradient(135deg,var(--sky),#0077B6); color:#fff; border:none; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px rgba(26,133,200,0.4); display:none; }
.btn-next.show { display:block; }
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(26,133,200,0.5); }
.accent-bar { display:flex; gap:5px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.accent-label { font-size:0.72rem; font-weight:800; color:#aaa; }
.accent-btn { background:linear-gradient(135deg,#f8f9fa,#e9ecef); border:2px solid #dee2e6; border-radius:7px; padding:5px 11px; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all 0.15s; color:var(--ink); }
.accent-btn:hover { background:var(--sun); border-color:var(--sun-deep); transform:translateY(-1px); }
.type-input { width:100%; padding:12px 14px; border:2px solid #e0e0e0; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1.1rem; font-weight:700; color:var(--ink); outline:none; transition:border-color 0.2s; margin-bottom:10px; }
.type-input:focus { border-color:var(--fiesta); box-shadow:0 0 0 3px rgba(230,57,70,0.1); }
.type-input.ci { border-color:var(--correct); background:#f0faf4; }
.type-input.wi { border-color:var(--wrong); background:#fff5f5; animation:shake 0.35s ease; }
.btn-submit { width:100%; padding:12px; background:linear-gradient(135deg,var(--fiesta),#C1121F); color:#fff; border:none; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px rgba(230,57,70,0.4); margin-bottom:10px; }
.btn-submit:hover { transform:translateY(-2px); }
.win-screen { display:none; text-align:center; padding:50px 20px; animation:fadeIn 0.5s ease; }
.win-screen.show { display:block; }
.win-emoji { font-size:5rem; margin-bottom:12px; animation:bounce 0.9s ease infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
.win-title { font-family:'Fredoka One',cursive; font-size:2.6rem; color:var(--fiesta); margin-bottom:6px; }
.win-sub { font-size:1rem; color:#666; font-weight:700; margin-bottom:24px; }
.win-score { display:inline-block; background:linear-gradient(135deg,var(--sun),var(--sun-deep)); padding:18px 36px; border-radius:18px; margin-bottom:24px; box-shadow:0 8px 28px rgba(255,140,0,0.4); }
.win-num { font-family:'Fredoka One',cursive; font-size:3.5rem; color:#fff; }
.win-lbl { font-size:0.82rem; font-weight:800; color:rgba(255,255,255,0.8); text-transform:uppercase; letter-spacing:2px; }
.btn-replay { background:linear-gradient(135deg,var(--fiesta),#C1121F); color:#fff; border:none; padding:14px 40px; border-radius:50px; font-family:'Fredoka One',cursive; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 18px rgba(230,57,70,0.4); transition:all 0.2s; margin:5px; }
.btn-replay:hover { transform:translateY(-2px); box-shadow:0 10px 26px rgba(230,57,70,0.5); }
.btn-replay.dark { background:linear-gradient(135deg,#555,#333); box-shadow:0 6px 18px rgba(0,0,0,0.3); }
.confetti-piece { position:fixed; width:10px; height:10px; top:-10px; animation:confettiFall linear forwards; border-radius:2px; pointer-events:none; z-index:9999; }
@keyframes confettiFall { to{transform:translateY(110vh) rotate(720deg);opacity:0} }
@media (max-width:800px) {
  .layout,.layout-wide { grid-template-columns:1fr; }
  .info-card,.quiz-panel,.master-panel { position:static; }
  .header-title { font-size:1.1rem; }
  .level-tabs { display:none; }
  main { padding:12px 10px; }
}
</style>
</head>
<body>
<header>
  <div class="header-title">🇪🇸 Spain <span>Master</span></div>
  <div class="level-tabs">
    <button class="level-tab active" onclick="goLevel(1)">🗺️ Explorer</button>
    <button class="level-tab" onclick="goLevel(2)">🎯 Apprentice</button>
    <button class="level-tab" onclick="goLevel(3)">✍️ Master</button>
  </div>
  <div class="score-badge"><span class="star">⭐</span><span id="scoreDisplay">0</span> pts</div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
</div>
<div class="progress-label" id="progressLabel">0 / 17 Regions</div>

<main>
  <!-- LEVEL 1 -->
  <div id="level1">
    <div class="layout">
      <div>
        <div class="map-container">
          <div class="map-hint">Click a region to learn!</div>
          <svg class="map-svg" id="map1" viewBox="-5 15 710 600" xmlns="http://www.w3.org/2000/svg">
            <rect x="-5" y="15" width="710" height="600" fill="#DAEEFF" rx="12"/>
          </svg>
        </div>
        <div class="checklist">
          <h3>📋 Progress Tracker</h3>
          <div class="cl-grid" id="cl"></div>
        </div>
      </div>
      <div class="info-card" id="infoCard">
        <div class="card-placeholder" id="cardPh">
          <div class="emoji">🗺️</div>
          <p>Click any region on the map to start learning!</p>
        </div>
        <div class="region-card" id="regionCard" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- LEVEL 2 -->
  <div id="level2">
    <div class="win-screen" id="win2"></div>
    <div id="quizContent">
      <div class="layout-wide">
        <div class="map-container">
          <svg class="map-svg" id="map2" viewBox="-5 15 710 600" xmlns="http://www.w3.org/2000/svg">
            <rect x="-5" y="15" width="710" height="600" fill="#DAEEFF" rx="12"/>
          </svg>
        </div>
        <div class="quiz-panel">
          <div class="mode-toggle">
            <button class="mode-btn active" id="mbA" onclick="setMode('capital')">Community→Capital</button>
            <button class="mode-btn" id="mbB" onclick="setMode('community')">Capital→Community</button>
          </div>
          <div class="q-label">❓ Question <span id="qNum">1</span> of 17</div>
          <div class="q-text" id="qText">Loading…</div>
          <div class="options-grid" id="optGrid"></div>
          <div class="fb-box" id="fb2"></div>
          <button class="btn-next" id="btnNext" onclick="nextQ()">Next Region →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LEVEL 3 -->
  <div id="level3">
    <div class="win-screen" id="win3"></div>
    <div id="masterContent">
      <div class="layout-wide">
        <div class="map-container">
          <svg class="map-svg" id="map3" viewBox="-5 15 710 600" xmlns="http://www.w3.org/2000/svg">
            <rect x="-5" y="15" width="710" height="600" fill="#DAEEFF" rx="12"/>
          </svg>
        </div>
        <div class="master-panel">
          <div class="q-label">✍️ Master — <span id="mQNum">1</span> of 17</div>
          <div class="q-text" id="mQText">Loading…</div>
          <div class="accent-bar">
            <span class="accent-label">Insert:</span>
            <button class="accent-btn" onclick="ins('á')">á</button>
            <button class="accent-btn" onclick="ins('é')">é</button>
            <button class="accent-btn" onclick="ins('í')">í</button>
            <button class="accent-btn" onclick="ins('ó')">ó</button>
            <button class="accent-btn" onclick="ins('ú')">ú</button>
            <button class="accent-btn" onclick="ins('ñ')">ñ</button>
            <button class="accent-btn" onclick="ins('Á')">Á</button>
          </div>
          <input type="text" class="type-input" id="typeInput" placeholder="Type the capital city…" autocomplete="off" onkeydown="if(event.key==='Enter')checkMaster()">
          <div class="fb-box" id="fb3"></div>
          <button class="btn-submit" id="btnSub" onclick="checkMaster()">Check Answer 🎯</button>
          <button class="btn-next" id="btnMNext" onclick="nextMaster()" style="background:linear-gradient(135deg,#8B4513,#6B3410)">Next Region →</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const REGIONS = [
  {id:'andalusia',   name:'Andalusia',           capital:'Seville',                     flag:'🌞', color:'#E9C46A',
   mnemonic:'In Andalusia, you can See-ville (Seville) better because it\'s SO sunny!'},
  {id:'aragon',      name:'Aragon',               capital:'Zaragoza',                    flag:'🐉', color:'#F4A261',
   mnemonic:'The Aragon dragon flew to Zara-GO-za! Think: Zara fashion + GO + za!'},
  {id:'asturias',    name:'Asturias',              capital:'Oviedo',                      flag:'⛰️', color:'#88B04B',
   mnemonic:'Asturias has stunning mountains — "Oh! We\'d-o (Oviedo) love to hike there!"'},
  {id:'baleares',    name:'Balearic Islands',      capital:'Palma',                       flag:'🏝️', color:'#0077B6',
   mnemonic:'The Balearic Islands are paradise — hold your Palm-a (Palma) open to catch the sun!'},
  {id:'canarias',    name:'Canary Islands',        capital:'Las Palmas de Gran Canaria',  flag:'🐦', color:'#FFB347',
   mnemonic:'Canary Islands = tiny birds + big palms. Las Palm-as de Gran Canaria — palms for the birds!'},
  {id:'cantabria',   name:'Cantabria',             capital:'Santander',                   flag:'🐄', color:'#4ECDC4',
   mnemonic:'I left my Can in the Sant-under (Santander) the blazing sun!'},
  {id:'castillaleon',name:'Castilla y León',       capital:'Valladolid',                  flag:'🏰', color:'#C77DFF',
   mnemonic:'"Vaya, dolid!" (What a deal!) It\'s Valle-dolid — a bargain palace in Castilla!'},
  {id:'castillamancha',name:'Castilla-La Mancha',  capital:'Toledo',                      flag:'⚔️', color:'#9B5DE5',
   mnemonic:'Don Quixote from La Mancha had a "toll-edo" to pay at every windmill — Toledo!'},
  {id:'catalonia',   name:'Catalonia',             capital:'Barcelona',                   flag:'🎨', color:'#F15BB5',
   mnemonic:'Catalonia is easy — think Bar-SELL-ona! Everyone sells Gaudí art there!'},
  {id:'extremadura', name:'Extremadura',            capital:'Mérida',                      flag:'🦅', color:'#FEE440',
   mnemonic:'Extremadura is EXTREMELY hot — it\'s Merry-da (Mérida) warm! Like "merry" but scorching!'},
  {id:'galicia',     name:'Galicia',               capital:'Santiago de Compostela',      flag:'🐚', color:'#00BBF9',
   mnemonic:'Galicia — the famous pilgrim trail! Sant-iago walked to Compo-stella (star field)!'},
  {id:'larioja',     name:'La Rioja',              capital:'Logroño',                     flag:'🍷', color:'#9D0208',
   mnemonic:'La Rioja has the BEST wine. After a glass, you go: "Lo-groan-yo (Logroño)… one more!"'},
  {id:'madrid',      name:'Community of Madrid',   capital:'Madrid',                      flag:'👑', color:'#E63946',
   mnemonic:'The Community of Madrid\'s capital is… Madrid! The king lives right in the middle!'},
  {id:'murcia',      name:'Region of Murcia',      capital:'Murcia',                      flag:'🌶️', color:'#FB5607',
   mnemonic:'Murcia\'s capital is also Murcia — so hot and spicy, it named itself twice!'},
  {id:'navarra',     name:'Navarre',               capital:'Pamplona',                    flag:'🐂', color:'#3A86FF',
   mnemonic:'Navarre = Running of the Bulls in Pam-PLONA! The bulls go PLOM! through Pamplona!'},
  {id:'paisvasco',   name:'País Vasco',            capital:'Vitoria-Gasteiz',             flag:'🏆', color:'#38B000',
   mnemonic:'The Basque-etball team had a Vitoria (victory)! They scored in Vitoria-Gasteiz!'},
  {id:'valenciana',  name:'Valencian Community',   capital:'Valencia',                    flag:'🍊', color:'#FF9F1C',
   mnemonic:'Easy! The Valencian Community loves oranges — its capital is Valencia, the orange capital!'},
];

const LABEL_POS = {
  andalusia:[249,358], aragon:[437,155], asturias:[187,52], baleares:[605,248],
  canarias:[100,553], cantabria:[277,56], castillaleon:[256,132], castillamancha:[318,232],
  catalonia:[556,130], extremadura:[175,254], galicia:[82,76], larioja:[354,101],
  madrid:[286,189], murcia:[397,312], navarra:[393,84], paisvasco:[345,67], valenciana:[447,249]
};

const REGION_COLORS = {};

// ─── State ───
let score = 0, currentLevel = 1;
let learnedSet = new Set();
let quizQueue = [], quizIdx = 0, quizMode = 'capital', quizAnswer = '', missedQ = [];
let masterQueue = [], masterIdx = 0, masterAnswer = '', missedM = [];

// ─── Map builder ───
function buildMap(svgId, clickable, highlightId = null, dimAll = false) {
  const svg = document.getElementById(svgId);
  // keep background rect
  while (svg.children.length > 1) svg.removeChild(svg.lastChild);

  REGIONS.forEach(r => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', PATHS[r.id]);
    path.setAttribute('class', 'region-path');
    path.style.fill = REGION_COLORS[r.id] + '99'; // semi-transparent base

    if (highlightId === r.id) {
      path.classList.add('highlighted');
      path.style.fill = '#FFD93D';
    } else if (dimAll) {
      path.style.fill = '#b0cfe0';
      path.style.opacity = '0.55';
    } else if (learnedSet.has(r.id) && svgId === 'map1') {
      path.style.fill = '#2D9E5F';
    } else {
      path.style.fill = REGION_COLORS[r.id];
    }

    if (clickable) path.addEventListener('click', () => onRegionClick(r));

    const [lx, ly] = LABEL_POS[r.id];
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', lx); txt.setAttribute('y', ly);
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('class', 'region-label');
    txt.setAttribute('font-size', r.id === 'canarias' || r.id === 'baleares' ? '7' : '8.5');
    // Short label for small regions
    const label = r.name.length > 13 ? r.name.split(' ').slice(0,2).join('\n') : r.name;
    if (label.includes('\n')) {
      label.split('\n').forEach((line, i) => {
        const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        tspan.setAttribute('x', lx);
        tspan.setAttribute('dy', i === 0 ? '0' : '9');
        tspan.textContent = line;
        txt.appendChild(tspan);
      });
    } else {
      txt.textContent = label;
    }

    g.appendChild(path);
    g.appendChild(txt);
    svg.appendChild(g);
  });
}

// ─── LEVEL 1 ───
function onRegionClick(r) {
  buildMap('map1', true);
  // highlight clicked
  const paths = document.querySelectorAll('#map1 .region-path');
  paths.forEach(p => { if (p.parentNode.querySelector('text')?.textContent?.replace('\n','').includes(r.name.split(' ')[0])) p.classList.add('active'); });
  // find and highlight by index
  const allPaths = document.querySelectorAll('#map1 .region-path');
  const idx = REGIONS.indexOf(r);
  if (allPaths[idx]) {
    allPaths[idx].style.fill = '#E63946';
    allPaths[idx].style.filter = 'drop-shadow(0 3px 10px rgba(230,57,70,0.55))';
  }

  document.getElementById('cardPh').style.display = 'none';
  const card = document.getElementById('regionCard');
  card.style.display = 'block';
  card.innerHTML = `
    <div class="rc-flag">${r.flag}</div>
    <div class="rc-name">${r.name}</div>
    <div class="rc-sublabel">Capital City</div>
    <div class="rc-capital">🏛️ ${r.capital}</div>
    <div class="mnemonic">${r.mnemonic}</div>
    <button class="btn-learned" onclick="markLearned('${r.id}')">
      ${learnedSet.has(r.id) ? '✅ Already Learned!' : '✅ Mark as Learned!'}
    </button>
  `;
}

function markLearned(id) {
  if (!learnedSet.has(id)) {
    learnedSet.add(id);
    score += 5; updateScore();
    buildMap('map1', true);
    updateChecklist();
    updateProgress();
    const btn = document.querySelector('#regionCard .btn-learned');
    if (btn) btn.textContent = '✅ Already Learned!';
  }
}

function updateChecklist() {
  document.getElementById('cl').innerHTML = REGIONS.map(r =>
    `<div class="cl-item ${learnedSet.has(r.id)?'done':''}">
      <div class="cl-dot">${learnedSet.has(r.id)?'✓':''}</div>
      <span>${r.name}</span>
    </div>`
  ).join('');
}

// ─── LEVEL 2 ───
function initQuiz() {
  quizQueue = shuffle([...REGIONS]); missedQ = []; quizIdx = 0;
  document.getElementById('win2').classList.remove('show');
  document.getElementById('quizContent').style.display = 'block';
  buildMap('map2', false);
  loadQ();
}

function setMode(m) {
  quizMode = m;
  document.getElementById('mbA').classList.toggle('active', m==='capital');
  document.getElementById('mbB').classList.toggle('active', m==='community');
  initQuiz();
}

function loadQ() {
  updateProgress();
  if (quizIdx >= quizQueue.length) {
    if (missedQ.length) { quizQueue=[...missedQ]; missedQ=[]; quizIdx=0; loadQ(); return; }
    showWin(2); return;
  }
  const r = quizQueue[quizIdx];
  quizAnswer = quizMode==='capital' ? r.capital : r.name;
  document.getElementById('qNum').textContent = Math.min(quizIdx+1, 17);
  document.getElementById('qText').innerHTML = quizMode==='capital'
    ? `What is the capital of <span>${r.name}</span>?`
    : `The capital <span>${r.capital}</span> belongs to which Community?`;

  buildMap('map2', false, r.id);

  const wrong = shuffle(REGIONS.filter(x=>x.id!==r.id)).slice(0,3);
  const opts = shuffle([r,...wrong]);
  document.getElementById('optGrid').innerHTML = opts.map(o => {
    const lbl = quizMode==='capital' ? o.capital : o.name;
    return `<button class="opt-btn" onclick="checkQ(this,'${lbl.replace(/'/g,"\\'")}')">
      ${lbl}
    </button>`;
  }).join('');

  const fb = document.getElementById('fb2');
  fb.className = 'fb-box';
  document.getElementById('btnNext').classList.remove('show');
}

function checkQ(btn, chosen) {
  const r = quizQueue[quizIdx];
  document.querySelectorAll('#optGrid .opt-btn').forEach(b=>b.disabled=true);
  const fb = document.getElementById('fb2');
  if (chosen === quizAnswer) {
    btn.classList.add('correct');
    fb.className='fb-box fb-correct show';
    fb.innerHTML=`🎉 Brilliant! <strong>${quizAnswer}</strong> is correct! ${r.flag}`;
    score+=10; updateScore(); learnedSet.add(r.id);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('#optGrid .opt-btn').forEach(b=>{ if(b.textContent.trim()===quizAnswer) b.classList.add('reveal'); });
    fb.className='fb-box fb-wrong show';
    fb.innerHTML=`💡 Not quite! Remember: <em>${r.mnemonic}</em><br><br>The answer is <strong>${quizAnswer}</strong>.`;
    missedQ.push(r);
  }
  document.getElementById('btnNext').classList.add('show');
}

function nextQ() { quizIdx++; loadQ(); }

// ─── LEVEL 3 ───
function initMaster() {
  masterQueue = shuffle([...REGIONS]); missedM = []; masterIdx = 0;
  document.getElementById('win3').classList.remove('show');
  document.getElementById('masterContent').style.display = 'block';
  buildMap('map3', false);
  loadMaster();
}

function loadMaster() {
  updateProgress();
  if (masterIdx >= masterQueue.length) {
    if (missedM.length) { masterQueue=[...missedM]; missedM=[]; masterIdx=0; loadMaster(); return; }
    showWin(3); return;
  }
  const r = masterQueue[masterIdx];
  masterAnswer = r.capital;
  document.getElementById('mQNum').textContent = Math.min(masterIdx+1, 17);
  document.getElementById('mQText').innerHTML = `Type the capital of <span>${r.name}</span> ${r.flag}`;
  buildMap('map3', false, r.id);

  const inp = document.getElementById('typeInput');
  inp.value=''; inp.className='type-input'; inp.disabled=false; inp.focus();
  const fb = document.getElementById('fb3');
  fb.className = 'fb-box';
  document.getElementById('btnSub').style.display='block';
  document.getElementById('btnMNext').classList.remove('show');
}

function ins(ch) {
  const inp = document.getElementById('typeInput');
  const s=inp.selectionStart, e=inp.selectionEnd;
  inp.value=inp.value.slice(0,s)+ch+inp.value.slice(e);
  inp.selectionStart=inp.selectionEnd=s+1; inp.focus();
}

function norm(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }

function checkMaster() {
  const r = masterQueue[masterIdx];
  const typed = document.getElementById('typeInput').value.trim();
  if (!typed) return;
  const inp = document.getElementById('typeInput');
  const fb = document.getElementById('fb3');
  if (norm(typed)===norm(masterAnswer)) {
    inp.className='type-input ci';
    fb.className='fb-box fb-correct show';
    fb.innerHTML=`🎉 Perfect! <strong>${masterAnswer}</strong> is correct! ${r.flag}`;
    score+=15; updateScore(); learnedSet.add(r.id);
  } else {
    inp.className='type-input wi';
    fb.className='fb-box fb-wrong show';
    fb.innerHTML=`❌ You typed: <em>${typed}</em><br>💡 ${r.mnemonic}<br><br>Correct spelling: <strong>${masterAnswer}</strong>`;
    missedM.push(r);
  }
  inp.disabled=true;
  document.getElementById('btnSub').style.display='none';
  document.getElementById('btnMNext').classList.add('show');
}

function nextMaster() { masterIdx++; loadMaster(); }

// ─── Win Screen ───
function showWin(lvl) {
  const winId = lvl===2?'win2':'win3';
  const contentId = lvl===2?'quizContent':'masterContent';
  document.getElementById(contentId).style.display='none';
  const win = document.getElementById(winId);
  win.classList.add('show');
  win.innerHTML=`
    <div class="win-emoji">🏆</div>
    <div class="win-title">¡Fantástico!</div>
    <div class="win-sub">You've mastered all 17 regions!${lvl===3?' 🎓 You\'re a true Spain Master!':' 🎯 Ready for the next challenge?'}</div>
    <div class="win-score"><div class="win-num">${score}</div><div class="win-lbl">Total Points</div></div><br>
    ${lvl<3?`<button class="btn-replay" onclick="goLevel(${lvl+1})">→ Level ${lvl+1}: ${lvl===1?'Apprentice':'Master'} Mode</button>`:''}
    <button class="btn-replay dark" onclick="${lvl===2?'initQuiz()':'initMaster()}'}">🔄 Play Again</button>
  `;
  confetti();
}

function confetti() {
  const cols=['#FFD93D','#E63946','#2D9E5F','#1A85C8','#FF9F1C','#C77DFF'];
  for (let i=0;i<70;i++) setTimeout(()=>{
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${cols[0|Math.random()*cols.length]};width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.5}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  }, i*35);
}

// ─── Level switching ───
function goLevel(n) {
  currentLevel = n;
  [1,2,3].forEach(i=>{
    document.getElementById('level'+i).style.display=i===n?'block':'none';
    document.querySelectorAll('.level-tab')[i-1].classList.toggle('active',i===n);
  });
  if (n===1) { buildMap('map1',true); updateChecklist(); updateProgress(); }
  if (n===2) initQuiz();
  if (n===3) initMaster();
}

function updateScore() { document.getElementById('scoreDisplay').textContent=score; }
function updateProgress() {
  const done = currentLevel===1?learnedSet.size:currentLevel===2?Math.min(quizIdx,17):Math.min(masterIdx,17);
  document.getElementById('progressFill').style.width=(done/17*100)+'%';
  const lbl=['','Explored','Answered','Mastered'];
  document.getElementById('progressLabel').textContent=`${done} / 17 Regions ${lbl[currentLevel]}`;
}
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];} return b; }

// Boot
buildMap('map1', true);
updateChecklist();
updateProgress();
</script>
</body>
</html>
