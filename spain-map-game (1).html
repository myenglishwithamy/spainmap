<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🇪🇸 Spain: A Community of Provinces</title>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#E8F4FD;overflow:hidden;height:100vh;user-select:none;}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;max-height:100vh;}
#topbar{background:linear-gradient(135deg,#D62828 0%,#E63946 40%,#F4A261 100%);
  padding:8px 16px;display:flex;align-items:center;gap:12px;
  box-shadow:0 3px 12px rgba(214,40,40,0.4);flex-shrink:0;}
#topbar h1{font-size:1.25rem;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.3);letter-spacing:-.5px;}
#topbar .sub{font-size:0.75rem;color:rgba(255,255,255,0.85);font-weight:600;}
#topbar .flag{font-size:1.8rem;line-height:1;}
.score-area{margin-left:auto;display:flex;align-items:center;gap:10px;}
.score-badge{background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.5);
  border-radius:20px;padding:4px 14px;color:#fff;font-weight:800;font-size:0.9rem;display:flex;align-items:center;gap:5px;}

#main{display:flex;flex:1;overflow:hidden;gap:0;}

/* ── MAP AREA ── */
#mapArea{flex:1;position:relative;background:linear-gradient(145deg,#BDE8FF 0%,#A8D8F0 100%);
  overflow:hidden;display:flex;align-items:center;justify-content:center;}
#mapArea::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,0.3) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(100,180,255,0.2) 0%,transparent 50%);}

#mapSvg{width:100%;height:100%;position:relative;z-index:1;}
#mapSvg path{stroke:#fff;stroke-width:1.2;stroke-linejoin:round;cursor:pointer;
  transition:filter 0.15s,opacity 0.2s;}
#mapSvg path:hover{filter:brightness(1.12) drop-shadow(0 3px 8px rgba(0,0,0,0.25));}
.comm-path{fill-opacity:0.9;}
.prov-path{stroke:#fff;stroke-width:0.8;fill-opacity:0.88;}
.prov-path:hover{filter:brightness(1.15) drop-shadow(0 2px 6px rgba(0,0,0,0.3));}

/* community name labels */
.comm-label{pointer-events:none;font-family:'Segoe UI',sans-serif;font-weight:700;
  fill:#fff;text-shadow:1px 1px 2px rgba(0,0,0,0.4);paint-order:stroke;
  stroke:#00000066;stroke-width:2.5;stroke-linejoin:round;}
.prov-label{pointer-events:none;font-family:'Segoe UI',sans-serif;font-weight:700;fill:#1a1a2e;
  paint-order:stroke;stroke:rgba(255,255,255,0.8);stroke-width:2;stroke-linejoin:round;}

/* León star */
.leon-star{pointer-events:none;fill:#FFD700;stroke:#FF8C00;stroke-width:1;}

/* ── SIDEBAR ── */
#sidebar{width:300px;background:#fff;display:flex;flex-direction:column;
  box-shadow:-4px 0 20px rgba(0,0,0,0.12);flex-shrink:0;overflow:hidden;}

/* Mode tabs */
#modeTabs{display:flex;background:#f5f5f5;border-bottom:2px solid #e0e0e0;}
.mode-tab{flex:1;padding:9px 6px;font-size:0.78rem;font-weight:800;text-align:center;
  cursor:pointer;border:none;background:none;color:#888;transition:all 0.2s;letter-spacing:.3px;}
.mode-tab.active{background:#fff;color:#D62828;border-bottom:3px solid #D62828;margin-bottom:-2px;}

/* Info panel */
#infoPanel{flex:1;overflow-y:auto;padding:14px;}
.info-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:#bbb;text-align:center;gap:8px;padding:20px;}
.info-placeholder .big-icon{font-size:3.5rem;opacity:0.4;}
.info-placeholder p{font-size:0.82rem;font-weight:600;line-height:1.5;}

.comm-info-card{animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.info-community-name{font-size:1.15rem;font-weight:800;margin-bottom:2px;}
.info-emoji{font-size:2rem;margin-bottom:6px;}
.info-sub{font-size:0.75rem;color:#888;font-weight:600;margin-bottom:12px;}
.prov-list{display:flex;flex-direction:column;gap:6px;}
.prov-card{background:#f8f9ff;border:2px solid #e8ecff;border-radius:10px;padding:10px 12px;
  cursor:pointer;transition:all 0.2s;}
.prov-card:hover{border-color:#4A90D9;background:#eef3ff;transform:translateX(3px);}
.prov-card.selected{border-color:#D62828;background:#fff0f0;}
.prov-card.leon-home{border-color:#FFD700;background:linear-gradient(135deg,#fffce8,#fff9d0);}
.prov-name{font-weight:800;font-size:0.9rem;color:#1a1a2e;display:flex;align-items:center;gap:6px;}
.prov-capital{font-size:0.78rem;color:#666;margin-top:2px;}
.prov-capital span{font-weight:700;color:#4A90D9;}
.same-badge{background:#00B87C;color:#fff;font-size:0.6rem;font-weight:800;
  padding:1px 6px;border-radius:20px;letter-spacing:.5px;}
.diff-badge{background:#E63946;color:#fff;font-size:0.6rem;font-weight:800;
  padding:1px 6px;border-radius:20px;letter-spacing:.5px;}
.star-badge{font-size:0.85rem;}
.mnemonic-box{margin-top:8px;padding:8px 10px;background:linear-gradient(135deg,#fff9e0,#fff3c0);
  border:1.5px solid #FFD700;border-radius:8px;font-size:0.76rem;font-style:italic;
  color:#6b4f00;line-height:1.5;}
.mnemonic-box::before{content:'💡 ';font-style:normal;}

/* ── GAME PANEL ── */
#gamePanel{display:none;flex-direction:column;height:100%;padding:12px;}
.game-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.game-title{font-size:1rem;font-weight:800;color:#1a1a2e;flex:1;}
.game-score{font-family:monospace;font-size:1.2rem;font-weight:800;color:#D62828;}
.progress-bar-outer{background:#eee;border-radius:50px;height:7px;overflow:hidden;margin-bottom:10px;}
.progress-bar-inner{height:100%;border-radius:50px;background:linear-gradient(90deg,#00B87C,#4CAF50);
  transition:width 0.4s ease;}

/* Province drop targets */
.drop-targets{display:grid;gap:6px;flex:1;overflow-y:auto;}
.drop-target{background:#f0f4ff;border:2.5px dashed #c0c8e0;border-radius:10px;
  min-height:42px;display:flex;align-items:center;padding:6px 10px;gap:8px;
  transition:all 0.2s;position:relative;}
.drop-target.drag-over{border-color:#4A90D9;background:#e3eeff;transform:scale(1.02);}
.drop-target.correct{border-color:#00B87C;background:#e8fff5;border-style:solid;}
.drop-target.wrong{border-color:#E63946;background:#fff0f0;border-style:solid;animation:shake .35s ease;}
.drop-target .slot-num{font-size:0.7rem;font-weight:800;color:#aaa;width:18px;flex-shrink:0;}
.drop-target .slot-name{font-size:0.75rem;color:#888;font-weight:600;font-style:italic;}
.drop-target .placed-chip{font-size:0.8rem;font-weight:800;color:#1a1a2e;}
.drop-target .result-icon{margin-left:auto;font-size:1rem;}

/* Draggable chips */
.chips-area{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0;}
.drag-chip{background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;
  border:none;border-radius:20px;padding:6px 14px;font-size:0.8rem;font-weight:800;
  cursor:grab;user-select:none;box-shadow:0 3px 8px rgba(74,144,217,0.4);
  transition:all 0.2s;touch-action:none;}
.drag-chip:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(74,144,217,0.5);}
.drag-chip.dragging{opacity:0.35;transform:scale(0.9);}
.drag-chip.used{opacity:0;pointer-events:none;width:0;padding:0;overflow:hidden;margin:0;}

/* Feedback */
.feedback-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  border-radius:16px;padding:12px 22px;font-weight:800;font-size:0.95rem;
  box-shadow:0 6px 24px rgba(0,0,0,0.2);z-index:999;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;text-align:center;}
.feedback-toast.show{transform:translateX(-50%) translateY(0);}
.feedback-toast.correct-toast{background:linear-gradient(135deg,#00B87C,#00D490);color:#fff;}
.feedback-toast.wrong-toast{background:linear-gradient(135deg,#E63946,#FF6B7A);color:#fff;}

/* Buttons */
.btn{border:none;border-radius:20px;padding:8px 18px;font-weight:800;font-size:0.82rem;
  cursor:pointer;transition:all 0.2s;font-family:inherit;}
.btn-play{background:linear-gradient(135deg,#00B87C,#00D490);color:#fff;
  box-shadow:0 3px 10px rgba(0,184,124,0.4);}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,184,124,0.5);}
.btn-red{background:linear-gradient(135deg,#D62828,#E63946);color:#fff;
  box-shadow:0 3px 10px rgba(214,40,40,0.4);}
.btn-red:hover{transform:translateY(-2px);}
.btn-grey{background:#eee;color:#555;}
.btn-grey:hover{background:#ddd;}

/* Win card */
.win-card{text-align:center;padding:20px;animation:slideIn .4s ease;}
.win-emoji{font-size:3.5rem;display:block;margin-bottom:8px;animation:bounce .8s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.win-title{font-size:1.2rem;font-weight:800;color:#00B87C;margin-bottom:4px;}
.win-sub{font-size:0.8rem;color:#888;font-weight:600;margin-bottom:16px;}

/* Zoom back button */
#zoomBackBtn{position:absolute;top:12px;left:12px;z-index:10;
  background:#fff;border:2px solid #e0e0e0;border-radius:12px;
  padding:6px 14px;font-weight:800;font-size:0.82rem;cursor:pointer;
  display:none;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,0.1);
  color:#333;transition:all 0.2s;}
#zoomBackBtn:hover{border-color:#D62828;color:#D62828;}

/* Community nav pills at bottom */
#commNav{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:95%;z-index:5;}
.comm-pill{background:rgba(255,255,255,0.92);border:2px solid rgba(255,255,255,0.6);
  border-radius:20px;padding:4px 10px;font-size:0.68rem;font-weight:800;cursor:pointer;
  transition:all 0.2s;color:#333;backdrop-filter:blur(4px);}
.comm-pill:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,0.15);}
.comm-pill.selected{color:#fff;border-color:transparent;}

/* Animations */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes confettiFall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}
.confetti-piece{position:fixed;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiFall linear forwards;}

/* Mobile */
@media(max-width:600px){
  #sidebar{width:260px;}
  #topbar h1{font-size:1rem;}
  .comm-pill{font-size:0.62rem;padding:3px 7px;}
}
@media(max-width:480px){
  #main{flex-direction:column;}
  #sidebar{width:100%;height:240px;flex-direction:row;}
  #modeTabs{flex-direction:column;width:70px;flex-shrink:0;}
  .mode-tab{padding:6px;font-size:0.65rem;}
}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}
</style>
</head>

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="modeTabs">

      <div id="infoPanel">
        <div class="info-placeholder" id="infoPlaceholder">
          <div class="big-icon">🗺️</div>
          <p><strong>Click any community</strong> on the map to explore its provinces and capitals!</p>
          <p style="margin-top:8px;font-size:0.72rem;color:#ccc">Castilla y León is highlighted as your home region ⭐</p>
        </div>
        <div id="commInfoContent" style="display:none"></div>
      </div>
      <div id="gamePanel">
        <div id="gameContent"></div>
      </div>
    </div>
  </div>
</div>

<!-- FEEDBACK TOAST -->
<div class="feedback-toast" id="feedbackToast"></div>

// ════════════════════════════════════════════════════
// AUDIO (Web Audio API — no external files needed)
// ════════════════════════════════════════════════════
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === "correct") {
      // Happy ding: two quick ascending tones
      [523.25, 783.99].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = "sine";
        gain.gain.setValueAtTime(0, ctx.currentTime + i*0.12);
        gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + i*0.12 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.3);
        osc.start(ctx.currentTime + i*0.12);
        osc.stop(ctx.currentTime + i*0.12 + 0.35);
      });
    } else {
      // Wrong boop: descending dull tone
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.25);
      osc.type = "square";
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
    }
  } catch(e){}
}

function renderProvMap(commId) {
  const c = COMMUNITIES[commId];

  document.getElementById("commNav").style.display = "none";

  zoomToComm(commId);

  c.provinces.forEach((pid, i) => {
    const p = PROVINCES[pid];

    if (!pathD) return;

    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d", pathD);
    path.setAttribute("class","prov-path");

    path.setAttribute("data-pid", pid);
    if (p.home) {
      path.setAttribute("stroke","#FFD700");
      path.setAttribute("stroke-width","2.5");
    }
    path.addEventListener("click", () => selectProvince(pid));
    provLayer.appendChild(path);

    // Province label
    const [cx, cy] = PROV_CENTROIDS[pid] || [350, 215];
    const txt = document.createElementNS("http://www.w3.org/2000/svg","text");

    txt.setAttribute("class","prov-label");

    // León star

      const star = document.createElementNS("http://www.w3.org/2000/svg","text");
      star.setAttribute("x", cx); star.setAttribute("y", cy - 11);
      star.setAttribute("text-anchor","middle");
      star.setAttribute("font-size","11");
      star.textContent = "⭐";
      provLabels.appendChild(star);
    }
  });
}

function zoomToComm(commId) {
  const c = COMMUNITIES[commId];
  if (!c) return;
  // Get bounding box of all province paths
  let minX=700,minY=550,maxX=0,maxY=0;
  c.provinces.forEach(pid => {
    const pathD = PROV_PATHS[pid];
    if (!pathD) return;
    const coords = pathD.match(/[-\d.]+,[-\d.]+/g) || [];
    coords.forEach(co => {
      const [x,y] = co.split(",").map(Number);
      if (x<minX) minX=x; if (x>maxX) maxX=x;
      if (y<minY) minY=y; if (y>maxY) maxY=y;
    });
  });
  const pad = 20;
  const vx = minX-pad, vy = minY-pad, vw = (maxX-minX)+pad*2, vh = (maxY-minY)+pad*2;
  // Animate viewBox
  document.getElementById("mapSvg").setAttribute("viewBox", `${vx} ${vy} ${vw} ${vh}`);
}

function shadeColor(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255,Math.max(0,(num>>16) + pct));
  const g = Math.min(255,Math.max(0,((num>>8)&0xff) + pct));
  const b = Math.min(255,Math.max(0,(num&0xff) + pct));
  return `rgb(${r},${g},${b})`;
}

function initGame(cid) {
  const c = COMMUNITIES[cid];
  const provIds = [...c.provinces];
  const shuffled = shuffle([...provIds]);
  gameState = {
    cid, provIds,
    targets: provIds.map(pid => ({ pid, filled: null, correct: false })),
    chips: shuffled,
    done: 0, wrong: 0, total: provIds.length,
    roundScore: 0
  };
  renderGame();
}

function renderGame() {
  if (!gameState) return;
  const c = COMMUNITIES[gameState.cid];
  const cont = document.getElementById("gameContent");

  cont.innerHTML = `
    <div class="game-header">
      <div>
        <div class="game-title">${c.emoji} Match ${c.name}</div>
        <div style="font-size:0.72rem;color:#888;font-weight:600">Drag province names to their correct slots</div>
      </div>
      <div class="game-score" id="gameScore">0</div>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="gameProg" style="width:0%"></div>
    </div>
    <div class="drop-targets" id="dropTargets">
      ${gameState.targets.map((t, i) => {
        const p = PROVINCES[t.pid];
        return `<div class="drop-target" id="dt-${t.pid}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="dropOnTarget(event,'${t.pid}')">
          <span class="slot-num">${i+1}</span>
          <span class="slot-name" id="dt-name-${t.pid}">${p.name}</span>
          <span class="placed-chip" id="dt-placed-${t.pid}" style="display:none"></span>
          <span class="result-icon" id="dt-icon-${t.pid}"></span>
        </div>`;
      }).join("")}
    </div>
    <div style="font-size:0.75rem;font-weight:700;color:#aaa;padding:4px 0 2px">📦 Drag from here:</div>
    <div class="chips-area" id="chipsArea">
      ${gameState.chips.map(pid => {
        const p = PROVINCES[pid];
        return `<div class="drag-chip" id="chip-${pid}" draggable="true"
          ondragstart="startDrag(event,'${pid}')"
          ondragend="endDrag('${pid}')">
          ${p.name}
        </div>`;
      }).join("")}
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;padding:4px 0">
      <button class="btn btn-grey" onclick="revealAll()" style="font-size:0.75rem;padding:5px 12px">👁️ Reveal</button>
      <button class="btn btn-red" onclick="initGame('${gameState.cid}')" style="font-size:0.75rem;padding:5px 12px">🔄 Reset</button>
    </div>`;

  setupTouchDrag();
}

function startDrag(e, pid) {
  dragChipId = pid;
  e.dataTransfer.setData("text/plain", pid);
  setTimeout(() => document.getElementById("chip-"+pid)?.classList.add("dragging"), 0);
}
function endDrag(pid) {
  document.getElementById("chip-"+pid)?.classList.remove("dragging");
}

function dropOnTarget(e, targetPid) {
  e.preventDefault();
  const pid = e.dataTransfer?.getData("text/plain") || dragChipId;
  if (!pid) return;
  e.currentTarget.classList.remove("drag-over");
  processMatch(pid, targetPid);
}

function processMatch(chipPid, targetPid) {
  const target = gameState.targets.find(t => t.pid === targetPid);
  if (!target || target.filled) return;

  const dt = document.getElementById("dt-"+targetPid);
  const icon = document.getElementById("dt-icon-"+targetPid);
  const placed = document.getElementById("dt-placed-"+targetPid);
  const nameEl = document.getElementById("dt-name-"+targetPid);
  const chip = document.getElementById("chip-"+chipPid);

  if (chipPid === targetPid) {
    // CORRECT
    dt.classList.add("correct"); dt.classList.remove("drag-over");
    nameEl.style.display = "none";
    placed.textContent = PROVINCES[chipPid].name;
    placed.style.display = "block";
    icon.textContent = "✅";
    chip?.classList.add("used");
    target.filled = chipPid; target.correct = true;
    gameState.done++;
    const pts = 10 + (streak >= 3 ? 5 : 0);
    score += pts; streak++;
    if (streak > bestStreak) bestStreak = streak;
    gameState.roundScore += pts;
    document.getElementById("gameScore").textContent = gameState.roundScore;
    document.getElementById("gameProg").style.width = (gameState.done/gameState.total*100)+"%";
    updateScoreDisplay();
    playSound("correct");
    showToast("🎉 ¡Muy bien! +" + pts, "correct");
    if (streak >= 3) showToast(`🔥 ${streak}x Streak! +5 bonus`, "correct");
    if (gameState.done === gameState.total) setTimeout(showWin, 600);
  } else {
    // WRONG
    dt.classList.add("wrong");
    setTimeout(() => dt.classList.remove("wrong"), 400);
    gameState.wrong++;
    streak = 0;
    updateScoreDisplay();
    playSound("wrong");
    showToast(`❌ Not quite! ${PROVINCES[chipPid].name} goes elsewhere`, "wrong");
  }
  dragChipId = null;
}

function revealAll() {
  if (!gameState) return;
  gameState.targets.forEach(t => {
    if (t.filled) return;
    processMatch(t.pid, t.pid);
  });
}

function showWin() {
  const c = COMMUNITIES[gameState.cid];
  const acc = Math.round(gameState.done / (gameState.done + gameState.wrong) * 100);
  document.getElementById("gameContent").innerHTML = `
    <div class="win-card">
      <span class="win-emoji">${acc===100?"🏆":"⭐"}</span>
      <div class="win-title">${acc===100?"Perfect! ¡Perfecto!":"Community Matched!"}</div>
      <div class="win-sub">${c.emoji} ${c.name} — ${acc}% accuracy</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap">
        <div style="background:#f0fff8;border:2px solid #00B87C;border-radius:10px;padding:10px 16px;text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:#00B87C">${gameState.roundScore}</div>
          <div style="font-size:0.7rem;font-weight:700;color:#888">POINTS</div>
        </div>
        <div style="background:#fff5f5;border:2px solid #ddd;border-radius:10px;padding:10px 16px;text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:#D62828">${gameState.wrong}</div>
          <div style="font-size:0.7rem;font-weight:700;color:#888">MISSES</div>
        </div>
        <div style="background:#fffbf0;border:2px solid #FFD700;border-radius:10px;padding:10px 16px;text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:#FF8C00">${bestStreak}</div>
          <div style="font-size:0.7rem;font-weight:700;color:#888">BEST STREAK</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-play" onclick="initGame('${gameState.cid}')">🔄 Play Again</button>
        <button class="btn btn-grey" onclick="switchTab('info')">📖 Study Mode</button>
      </div>
    </div>`;
  confetti();
}

// ════════════════════════════════════════════════════
// TOUCH DRAG SUPPORT
// ════════════════════════════════════════════════════
function setupTouchDrag() {
  document.querySelectorAll(".drag-chip").forEach(chip => {
    chip.addEventListener("touchstart", onTouchStart, {passive:false});
    chip.addEventListener("touchmove", onTouchMove, {passive:false});
    chip.addEventListener("touchend", onTouchEnd, {passive:false});
  });
}

function onTouchStart(e) {
  e.preventDefault();
  const chip = e.currentTarget;
  dragChipId = chip.id.replace("chip-","");
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchDragEl = chip.cloneNode(true);
  touchDragEl.style.cssText = `position:fixed;pointer-events:none;z-index:9999;opacity:0.85;
    transform:scale(1.08);left:${touchStartX-40}px;top:${touchStartY-20}px;`;
  document.body.appendChild(touchDragEl);
  chip.classList.add("dragging");
}
function onTouchMove(e) {
  e.preventDefault();
  if (!touchDragEl) return;
  const t = e.touches[0];
  touchDragEl.style.left = (t.clientX-40)+"px";
  touchDragEl.style.top  = (t.clientY-20)+"px";
  // Highlight nearest target
  document.querySelectorAll(".drop-target").forEach(dt => dt.classList.remove("drag-over"));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  el?.closest(".drop-target")?.classList.add("drag-over");
}
function onTouchEnd(e) {
  e.preventDefault();
  if (!touchDragEl) return;
  const t = e.changedTouches[0];
  document.querySelectorAll(".drop-target").forEach(dt => dt.classList.remove("drag-over"));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const target = el?.closest(".drop-target");
  if (target) {
    const targetPid = target.id.replace("dt-","");
    processMatch(dragChipId, targetPid);
  }
  touchDragEl.remove(); touchDragEl = null;
  document.getElementById("chip-"+dragChipId)?.classList.remove("dragging");
  dragChipId = null;
}

// ════════════════════════════════════════════════════
// SCORE + FEEDBACK
// ════════════════════════════════════════════════════
function updateScoreDisplay() {
  document.getElementById("scoreNum").textContent = score;
  if (streak >= 2) {
    document.getElementById("streakBadge").style.display = "flex";
    document.getElementById("streakNum").textContent = streak;
  } else {
    document.getElementById("streakBadge").style.display = "none";
  }
}

let toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById("feedbackToast");
  t.textContent = msg;
  t.className = `feedback-toast ${type==="correct"?"correct-toast":"wrong-toast"}`;
  void t.offsetWidth;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}

// ════════════════════════════════════════════════════
// CONFETTI
// ════════════════════════════════════════════════════
function confetti() {
  const cols = ["#FF6B35","#FFD700","#00B87C","#4A90D9","#E63946","#9B5DE5","#FF6BA8"];
  for (let i=0;i<60;i++) setTimeout(()=>{
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.cssText = `left:${Math.random()*100}vw;top:0;width:${7+Math.random()*7}px;height:${7+Math.random()*7}px;background:${cols[0|Math.random()*7]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.4}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3500);
  }, i*35);
}

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
